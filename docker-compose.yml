services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eliabeart_app
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - minio

  minio:
    image: minio/minio
    container_name: minio_container
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

volumes:
  minio_data:
